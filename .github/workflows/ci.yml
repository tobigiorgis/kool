name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      # - run: npm run test   # enabled in Fase 5 (Vitest)

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Skip runtime env validation (lib/env.ts) — CI has no real secrets.
      SKIP_ENV_VALIDATION: "1"
      # Clerk validates publishable-key FORMAT at prerender; must be valid base64
      # (decodes to clerk.example.com$), not a bare placeholder.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_APP_URL: https://app.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
